<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  background:#ffffff;
  color:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
  text-align:center;
}

.container{
  max-width:480px;
  background:#ffffff;
  padding:2.5rem 2rem;
  border-radius:20px;
  box-shadow:0 10px 40px rgba(0, 0, 255, 0.08);
  border:1px solid #e2e8f0;
  animation:fadeIn 0.8s ease;
}

h1{
  font-size:1.8rem;
  margin-bottom:1rem;
  color:#2563eb;
}

h2{
  font-size:1.1rem;
  margin-bottom:1.2rem;
  color:#3b82f6;
}

p{
  font-size:0.95rem;
  margin-bottom:1.5rem;
  line-height:1.6;
  color:#475569;
}

.highlight{
  background:#eff6ff;
  border:1px solid #bfdbfe;
  color:#1d4ed8;
  padding:0.7rem 1rem;
  border-radius:8px;
  font-weight:700;
  margin-bottom:1.5rem;
  display:inline-block;
}

.arrow{
  font-size:2rem;
  color:#2563eb;
  margin:1rem 0;
  animation:bounce 1.5s infinite;
}

/* CTA BUTTON */
.btn{
  background:linear-gradient(90deg, #2563eb, #1d4ed8);
  color:#fff;
  padding:1.4rem 2.5rem;
  border:none;
  border-radius:14px;
  font-size:1.2rem;
  font-weight:800;
  text-decoration:none;
  display:inline-block;
  box-shadow:0 8px 25px rgba(37,99,235,0.3);
  transition:0.3s;
  animation:pulse 1.5s infinite;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 12px 35px rgba(37,99,235,0.5);
}

/* 🔥 POPUP STYLE (MORE OBVIOUS) */
.popup{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#2563eb;
  color:#fff;
  padding:15px 20px;
  border-radius:12px;
  font-size:0.95rem;
  font-weight:600;
  box-shadow:0 10px 30px rgba(37,99,235,0.4);
  display:none;
  z-index:999;
  animation:slideUp 0.5s ease;
}

/* Animations */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

@keyframes slideUp{
  from{opacity:0; transform:translate(-50%, 40px);}
  to{opacity:1; transform:translate(-50%, 0);}
}

@media(max-width:600px){
  h1{font-size:1.5rem;}
  .btn{font-size:1.05rem;}
}
</style>
</head>

     class="btn"
     onclick="fbq('track','Lead');">
    CLICK HERE TO JOIN NOW
  </a>
</div>

<div class="popup" id="popup">🔥 Someone just joined</div>

<script>
const names = ["Ahmed", "John", "Blessing", "Fatima", "David", "Mary", "Ibrahim", "Esther"];
const locations = ["Lagos", "Abuja", "Ibadan", "Kano", "Port Harcourt"];

function showPopup(){
  let name = names[Math.floor(Math.random()*names.length)];
  let location = locations[Math.floor(Math.random()*locations.length)];

  const popup = document.getElementById("popup");

  popup.innerHTML = "🔥 " + name + " from " + location + " just joined";

  popup.style.display = "block";

  setTimeout(()=>{
    popup.style.display = "none";
  }, 4000);
}

setInterval(showPopup, 5000);
setTimeout(showPopup, 2000);
</script>
